name: Update site with latest films and books
on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:
jobs:
  update-site:
    name: Update site content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update site HTML
        run: python .github/scripts/update_site.py
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet || (git add docs/index.html && git commit -m "Update site with latest films and books" && git push)
